name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue in **meowcaller-js**! 🎉

            If you're reporting a bug, include logs and a minimal reproduction if possible.

          pr-message: |
            Thanks for your first pull request to **meowcaller-js**! 🎉

            A few quick checks before review:
            - Have you read [CONTRIBUTING.md](CONTRIBUTING.md)?
            - Run `node --test` to make sure nothing is broken.

            A maintainer will review your changes shortly. Thanks again!
