name: License Check

on:
  pull_request:
    paths:
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'package.json'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install --ignore-scripts

      - name: Check dependency licenses
        run: |
          set -e
          # List all direct+indirect dependencies and validate their license fields
          # Only OSI-approved licenses are allowed (MIT, Apache-2.0, BSD-2-Clause,
          # BSD-3-Clause, ISC, Unlicense, CC0-1.0, 0BSD).
          ALLOWED="MIT|Apache-2.0|BSD-2-Clause|BSD-3-Clause|ISC|Unlicense|CC0-1.0|0BSD"
          VIOLATIONS=0

          while IFS=$'\t' read -r name license; do
            # Skip self
            [ "$name" = "meowcaller-js" ] && continue
            # Strip SPDX-and / OR expressions by checking each fragment
            SANITIZED=$(echo "$license" | sed 's/(//g; s/)//g' | tr 'AND|OR' '\n')
            if ! echo "$SANITIZED" | grep -qE "^($ALLOWED)$" 2>/dev/null; then
              if [ -n "$license" ] && [ "$license" != "UNKNOWN" ]; then
                echo "❌ $name — $license (not in allowlist)"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi
          done < <(node -e "
            const pkg = require('./node_modules/.package-lock.json') ||
                       require('./package-lock.json');
            const pkgs = pkg.packages || {};
            for (const [path, info] of Object.entries(pkgs)) {
              if (!path) continue;
              const name = path.replace(/^node_modules\//, '');
              console.log(name + '\t' + (info.license || 'UNKNOWN'));
            }
          ")

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo ""
            echo "Found $VIOLATIONS dependency license violations."
            echo "See CONTRIBUTING.md#license-dependencies for the policy."
            exit 1
          fi
          echo "✅ All dependency licenses are OSI-approved."
